<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | NextGrid Technologies</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    /* Simple success state */
    .success-message {
      display: none;
      text-align: center;
      padding: 40px;
      background: #0f172a;
      color: white;
      border-radius: 12px;
    }

    .success-message h2 {
      margin-bottom: 10px;
    }

    .error-message {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<section class="section">
  <div class="container">

    <h2>Get Your Free Security Check</h2>
    <p>Fill in the form below and we’ll contact you shortly.</p>

    <!-- =========================
         FORM
    ========================= -->
    <form id="contact-form" class="contact-form">
      
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="text" name="company" placeholder="Company Name">
      <textarea name="message" placeholder="Tell us about your IT environment..." required></textarea>

      <button type="submit">Request Free Check</button>

      <p class="error-message" id="errorMsg">Something went wrong. Please try again.</p>

    </form>

    <!-- =========================
         SUCCESS MESSAGE
    ========================= -->
    <div class="success-message" id="successMsg">
      <h2>✅ You're All Set!</h2>
      <p>Your request has been received.</p>
      <p>We’ll contact you shortly.</p>

      <a href="https://wa.me/27680330794?text=Hi%20I%20just%20submitted%20a%20request"
         target="_blank"
         style="display:inline-block;margin-top:15px;background:#25D366;color:white;padding:10px 15px;border-radius:6px;text-decoration:none;">
        💬 Chat With Us Now
      </a>
    </div>

  </div>
</section>

<!-- =========================
     SCRIPT (AJAX)
========================= -->
<script>
const form = document.getElementById("contact-form");
const successMsg = document.getElementById("successMsg");
const errorMsg = document.getElementById("errorMsg");

// 🔴 IMPORTANT: Replace with your Formspree endpoint
const formEndpoint = "https://formspree.io/f/maqdkqyg";

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  try {
    const response = await fetch(formEndpoint, {
      method: "POST",
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      form.style.display = "none";
      successMsg.style.display = "block";
    } else {
      errorMsg.style.display = "block";
    }

  } catch (error) {
    errorMsg.style.display = "block";
  }
});
</script>

</body>
</html>
